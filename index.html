<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprender Juntos - Portal Inclusivo</title>
    <meta name="description" content="Repositório de atividades escolares com foco na inclusão e neurodiversidade.">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Phosphor Icons for modern iconography -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>

    <!-- Header Navigation -->
    <header class="navbar">
        <div class="container nav-content">
            <div class="logo">
                <i class="ph-fill ph-brain"></i>
                <h1>Aprender Juntos</h1>
            </div>
            <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Abrir menu">
                <i class="ph ph-list"></i>
            </button>
            <div class="nav-menus" id="nav-menus">
                <nav id="year-nav">
                    <!-- Year links will be injected here -->
                </nav>
                <nav id="top-nav">
                    <!-- Navigation links will be injected here -->
                </nav>
            </div>
        </div>
    </header>

    <!-- Main Content Context -->
    <main class="container" id="main-content">
        <!-- Dynamic content will be rendered inside this container -->
    </main>

    <!-- Modal for embedding presentations and other content -->
    <div id="content-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <button id="close-modal" class="close-modal" aria-label="Fechar"><i class="ph ph-x"></i></button>
            <h2 id="modal-title">Conteúdo</h2>
            <div class="iframe-container">
                <iframe id="modal-iframe" src="" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <script src="flashcardsData.js"></script>
    <script src="main.js"></script>
</body>
</html>
